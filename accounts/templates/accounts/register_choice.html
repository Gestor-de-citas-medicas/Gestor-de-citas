<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f6f8fb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            width: 100%;
            max-width: 520px;
            background: white;
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            margin-bottom: 10px;
            color: #0f172a;
        }
        p {
            color: #64748b;
            margin-bottom: 28px;
        }
        a.option {
            display: block;
            margin-bottom: 14px;
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #d7dee7;
            color: #0f172a;
            background: #fff;
        }
        a.option:hover {
            background: #f8fbff;
        }
        .back {
            display: inline-block;
            margin-top: 10px;
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Crear cuenta</h1>
        <p>Selecciona el tipo de usuario con el que deseas registrarte.</p>

        <a class="option" href="{% url 'patient_register' %}">
            Registrarme como paciente
        </a>

        <a class="option" href="{% url 'doctor_register' %}">
            Registrarme como doctor
        </a>

        <a class="back" href="{% url 'login' %}">Volver al login</a>
    </div>
</body>
</html>
